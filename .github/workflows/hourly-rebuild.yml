name: Hourly Rebuild

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Submit today's matches to IndexNow
        run: node scripts/push-today.mjs
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        continue-on-error: true   # don't fail the build if IndexNow is down

      - name: Commit built dist/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          # only commit if something changed
          if git diff --cached --quiet; then
            echo "No changes in dist/ — skipping commit"
          else
            git commit -m "build: hourly rebuild $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
